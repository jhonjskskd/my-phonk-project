<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solo Leveling | Phonk Awakening</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/addons/p5.sound.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #030305; font-family: 'Courier New', Courier, monospace; }
        
        /* THE SYSTEM UI OVERLAY */
        #overlay {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: radial-gradient(circle, rgba(20,0,40,0.95) 0%, rgba(0,0,0,1) 100%);
            z-index: 10; cursor: pointer; backdrop-filter: blur(10px);
        }
        .system-box { 
            border: 2px solid #a855f7; 
            padding: 40px; 
            background: rgba(15, 0, 30, 0.9);
            box-shadow: 0 0 40px rgba(168, 85, 247, 0.4);
            text-align: center;
            border-radius: 4px;
        }
        h1 { color: #a855f7; font-size: 2.5rem; letter-spacing: 6px; text-shadow: 0 0 20px #a855f7; margin: 0; }
        p { color: #d8b4fe; font-size: 1.1rem; letter-spacing: 3px; margin-top: 20px; text-transform: uppercase; }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="overlay" onclick="startAwakening()">
        <div class="system-box">
            <h1 id="status-title">[ SYSTEM ]</h1>
            <p id="status-msg" class="blink">LOADING MANA...</p>
        </div>
    </div>

    <script>
        let song, fft, monarchImg;
        let isLoaded = false;
        let particles = [];
        let speedLines = [];

        function preload() {
            // Loading exactly the files from your folder
            monarchImg = loadImage('dance.gif'); 
            song = loadSound('phonk.mp3', () => { 
                isLoaded = true; 
                document.getElementById('status-title').innerText = "[ QUEST SECURED ]";
                document.getElementById('status-msg').innerText = "TAP TO ARISE";
            });
        }

        function setup() {
            createCanvas(windowWidth, windowHeight);
            fft = new p5.FFT(0.8, 128);
            
            // Background Speed Lines
            for (let i = 0; i < 25; i++) {
                speedLines.push({ 
                    x: random(-width, width), 
                    y: random(-height, height), 
                    speed: random(15, 40) 
                });
            }
        }

        function draw() {
            // Dark purple/black with trails for movie look
            background(5, 0, 15, 75); 

            if (isLoaded && song.isPlaying()) {
                let bass = fft.getEnergy("bass");
                let treble = fft.getEnergy("treble");

                // --- 1. THE CAMERA ENGINE (Shake) ---
                let shake = map(bass, 190, 255, 0, 18);
                if (shake < 0) shake = 0;
                translate(width/2 + random(-shake, shake), height/2 + random(-shake, shake));

                // --- 2. CINEMATIC SPEED LINES ---
                stroke(168, 85, 247, 50);
                strokeWeight(1.5);
                for (let sl of speedLines) {
                    line(sl.x, sl.y, sl.x + 120, sl.y);
                    sl.x -= sl.speed * (bass/100); 
                    if (sl.x < -width/2 - 120) { sl.x = width/2; sl.y = random(-height/2, height/2); }
                }

                // --- 3. SHADOW PARTICLES (Rising Up) ---
                if (bass > 170) {
                    particles.push({
                        x: random(-150, 150), 
                        y: 250, 
                        s: random(5, 12), 
                        op: 255
                    });
                }
                for (let i = particles.length - 1; i >= 0; i--) {
                    let p = particles[i];
                    noStroke();
                    fill(107, 33, 168, p.op);
                    rect(p.x, p.y, p.s, p.s);
                    p.y -= 6;
                    p.op -= 5;
                    if (p.op <= 0) particles.splice(i, 1);
                }

                // --- 4. THE MONARCH (Main Character) ---
                let bounce = map(bass, 100, 255, 0.95, 1.3);
                let glitchX = map(treble, 170, 255, 0, 25);

                push();
                scale(bounce);
                imageMode(CENTER);

                // RGB Glitch Effect
                if (treble > 185) {
                    drawingContext.globalCompositeOperation = 'screen';
                    tint(255, 0, 0, 150); // Red Split
                    image(monarchImg, -glitchX, random(-2,2), 450, 650);
                    tint(0, 255, 255, 150); // Cyan Split
                    image(monarchImg, glitchX, random(-2,2), 450, 650);
                    drawingContext.globalCompositeOperation = 'source-over';
                }

                // Main Image
                noTint();
                image(monarchImg, 0, 0, 450, 650);

                // Bass Aura Flash
                tint(168, 85, 247, map(bass, 200, 255, 0, 200));
                image(monarchImg, 0, 0, 450, 650);
                noTint();
                pop();

                // --- 5. THE GLOWING EYES (Targeting your specific pose) ---
                drawingContext.shadowBlur = 45;
                drawingContext.shadowColor = color(0, 255, 255);
                stroke(255);
                strokeWeight(5);
                
                let eyeY = -195 * bounce; 
                line(-18, eyeY, -6, eyeY + 4); 
                line(8, eyeY, 20, eyeY + 4);
            }
        }

        function startAwakening() {
            if (getAudioContext().state !== 'running') {
                getAudioContext().resume();
            }
            if (isLoaded) {
                if (song.isPlaying()) {
                    song.pause();
                } else {
                    song.play();
                    document.getElementById('overlay').style.display = 'none';
                }
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
